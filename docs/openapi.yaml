openapi: 3.0.3
info:
  title: Portal API
  version: 0.1.0
servers:
  - url: http://localhost:8080
paths:
  /healthz:
    get:
      summary: Health check
      responses:
        '200':
          description: OK
  /readyz:
    get:
      summary: Readiness check
      responses:
        '200':
          description: Ready
  /api/v1/auth/login:
    get:
      summary: Redirect to Keycloak login
      responses:
        '302':
          description: Redirect
  /api/v1/auth/callback:
    get:
      summary: OIDC callback
      parameters:
        - in: query
          name: code
          schema:
            type: string
        - in: query
          name: state
          schema:
            type: string
      responses:
        '302':
          description: Redirect after session creation
  /api/v1/auth/logout:
    get:
      summary: Delete portal session then redirect to Keycloak logout
      parameters:
        - in: query
          name: reason
          schema:
            type: string
            enum: [manual, expired]
      responses:
        '302':
          description: Redirect
  /api/v1/me:
    get:
      summary: Current portal session profile
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
  /api/v1/apps:
    get:
      summary: Visible portal apps
      responses:
        '200':
          description: Visible apps
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
  /api/v1/admin/client-metas:
    get:
      summary: List portal client metadata
      responses:
        '200':
          description: Client metadata
    post:
      summary: Create or upsert portal client metadata
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PortalClientMeta'
      responses:
        '200':
          description: Saved
  /api/v1/admin/client-metas/{clientId}:
    put:
      summary: Update portal client metadata
      parameters:
        - in: path
          name: clientId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PortalClientMeta'
      responses:
        '200':
          description: Saved
    delete:
      summary: Delete portal client metadata
      parameters:
        - in: path
          name: clientId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted
  /api/v1/admin/settings:
    get:
      summary: Read portal settings
      responses:
        '200':
          description: Settings
    put:
      summary: Update portal settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                idleTimeoutMinutes:
                  type: integer
      responses:
        '200':
          description: Updated
components:
  schemas:
    SuccessEnvelope:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
    PortalClientMeta:
      type: object
      properties:
        clientId:
          type: string
        displayName:
          type: string
        description:
          type: string
        targetUrl:
          type: string
        enabled:
          type: boolean
        showInPortal:
          type: boolean
        requiredRealmRoles:
          type: array
          items:
            type: string
        requiredClientRoles:
          type: array
          items:
            type: string
