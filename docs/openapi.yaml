openapi: 3.0.3
info:
  title: Portal API
  version: 0.2.0
servers:
  - url: http://localhost:8080
paths:
  /healthz:
    get:
      summary: Health check
      responses:
        '200':
          description: OK
  /readyz:
    get:
      summary: Readiness check
      responses:
        '200':
          description: Ready
  /api/auth/login:
    get:
      summary: Start OIDC login
      responses:
        '302':
          description: Redirect to Keycloak
  /api/auth/callback:
    get:
      summary: OIDC callback
      responses:
        '302':
          description: Redirect back to portal-web
  /api/auth/logout:
    post:
      summary: Delete portal session and return Keycloak logout URL
      responses:
        '200':
          description: Logout URL
  /api/auth/me:
    get:
      summary: Current portal session
      responses:
        '200':
          description: Current session
  /api/portal/apps:
    get:
      summary: Current user's visible apps
      responses:
        '200':
          description: App list
  /api/portal/realms:
    get:
      summary: Projected realms
      responses:
        '200':
          description: Realm list
  /api/portal/profile:
    get:
      summary: Current user projected profile
      responses:
        '200':
          description: Profile
  /api/admin/realms:
    get:
      summary: Admin realm list
      responses:
        '200':
          description: Realm list
  /api/admin/clients:
    get:
      summary: Admin client list with portal metadata
      responses:
        '200':
          description: Client rows
  /api/admin/clients/{clientId}/meta:
    put:
      summary: Update portal_client_meta
      parameters:
        - in: path
          name: clientId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Saved
  /api/admin/users/{userId}:
    get:
      summary: Get projected user
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User projection
  /api/admin/settings/session:
    get:
      summary: Get session settings
      responses:
        '200':
          description: Session settings
    put:
      summary: Update session settings
      responses:
        '200':
          description: Session settings saved
  /api/admin/sync-status:
    get:
      summary: Get latest sync summary
      responses:
        '200':
          description: Sync status
