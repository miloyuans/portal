services:
  mongo:
    image: mongo:7
    container_name: portal-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  keycloak:
    image: quay.io/keycloak/keycloak:26.1.2
    container_name: portal-keycloak
    restart: unless-stopped
    command:
      - start-dev
      - --http-port=8080
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_BOOTSTRAP_ADMIN_USER:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_BOOTSTRAP_ADMIN_PASSWORD:-admin123}
    ports:
      - "8081:8080"

  portal-api:
    build:
      context: .
      dockerfile: apps/portal-api/Dockerfile
    container_name: portal-api
    restart: unless-stopped
    depends_on:
      - mongo
      - keycloak
    env_file:
      - .env
    environment:
      APP_ADDR: ${APP_ADDR:-:8080}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:-http://localhost:8080}
      WEB_PUBLIC_URL: ${WEB_PUBLIC_URL:-http://localhost:5173}
      MONGO_URI: ${MONGO_URI_INTERNAL:-mongodb://mongo:27017}
      MONGO_DB: ${MONGO_DB:-portal}
      KEYCLOAK_BASE_URL: ${KEYCLOAK_BASE_URL_INTERNAL:-http://keycloak:8080}
      KEYCLOAK_PUBLIC_URL: ${KEYCLOAK_PUBLIC_URL:-http://localhost:8081}
      KEYCLOAK_REDIRECT_URL: ${KEYCLOAK_REDIRECT_URL:-http://localhost:5173/api/auth/callback}
      KEYCLOAK_POST_LOGOUT_REDIRECT_URL: ${KEYCLOAK_POST_LOGOUT_REDIRECT_URL:-http://localhost:5173/login}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
    ports:
      - "8080:8080"

  portal-web:
    build:
      context: .
      dockerfile: apps/portal-web/Dockerfile
    container_name: portal-web
    restart: unless-stopped
    depends_on:
      - portal-api
    environment:
      PORTAL_API_BASE_URL: ${PORTAL_API_BASE_URL:-/api}
      PORTAL_APP_TITLE: ${PORTAL_APP_TITLE:-Portal}
    ports:
      - "5173:80"

volumes:
  mongo-data:
