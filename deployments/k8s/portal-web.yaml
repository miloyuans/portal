apiVersion: apps/v1
kind: Deployment
metadata:
  name: portal-web
  namespace: portal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portal-web
  template:
    metadata:
      labels:
        app: portal-web
    spec:
      containers:
        - name: portal-web
          image: portal-web:latest
          envFrom:
            - configMapRef:
                name: portal-config
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: portal-web
  namespace: portal
spec:
  selector:
    app: portal-web
  ports:
    - port: 80
      targetPort: 80
