apiVersion: v1
kind: ConfigMap
metadata:
  name: portal-config
  namespace: portal
data:
  APP_NAME: "portal"
  APP_ENV: "production"
  APP_ADDR: ":8080"
  APP_PUBLIC_URL: "https://portal.example.com/api"
  WEB_PUBLIC_URL: "https://portal.example.com"
  LOG_LEVEL: "INFO"
  MONGO_DB: "portal"
  MONGO_CONNECT_TIMEOUT_SECONDS: "10"
  KEYCLOAK_BASE_URL: "https://keycloak.example.com"
  KEYCLOAK_PUBLIC_URL: "https://keycloak.example.com"
  KEYCLOAK_REALM: "portal"
  KEYCLOAK_OIDC_CLIENT_ID: "portal-api"
  KEYCLOAK_REDIRECT_URL: "https://portal.example.com/api/auth/callback"
  KEYCLOAK_POST_LOGOUT_REDIRECT_URL: "https://portal.example.com/login"
  KEYCLOAK_ADMIN_CLIENT_ID: "portal-sync"
  SESSION_COOKIE_NAME: "portal_session"
  SESSION_SECURE: "true"
  SESSION_HTTP_ONLY: "true"
  SESSION_SAME_SITE: "Lax"
  SESSION_IDLE_TIMEOUT_MINUTES: "15"
  SESSION_ABSOLUTE_TIMEOUT_MINUTES: "480"
  SYNC_ON_LOGIN: "true"
  SYNC_TIMEOUT_SECONDS: "10"
  CORS_ALLOWED_ORIGINS: "https://portal.example.com"
  PORTAL_API_BASE_URL: "/api"
  PORTAL_APP_TITLE: "Portal"
