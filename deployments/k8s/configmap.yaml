apiVersion: v1
kind: ConfigMap
metadata:
  name: portal-config
  namespace: portal
data:
  PORTAL_API_LISTEN_ADDR: ":8080"
  PORTAL_PUBLIC_API_URL: "https://portal-api.example.com"
  PORTAL_PUBLIC_WEB_URL: "https://portal.example.com"
  PORTAL_ALLOWED_ORIGINS: "https://portal.example.com"
  PORTAL_MONGO_DATABASE: "portal"
  PORTAL_IDLE_TIMEOUT_MINUTES: "15"
  PORTAL_SESSION_TTL_HOURS: "8"
  PORTAL_ADMIN_REALM_ROLES: "portal-admin,realm-admin"
  KEYCLOAK_BASE_URL: "https://keycloak.example.com"
  KEYCLOAK_REALM: "portal"
  KEYCLOAK_ADMIN_REALM: "master"
  KEYCLOAK_CLIENT_ID: "portal-api"
  KEYCLOAK_REDIRECT_URL: "https://portal-api.example.com/api/v1/auth/callback"
  KEYCLOAK_LOGOUT_REDIRECT_URL: "https://portal.example.com/login"
  PORTAL_API_BASE_URL: "https://portal-api.example.com/api/v1"
  PORTAL_APP_TITLE: "Portal"
