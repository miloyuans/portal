apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: portal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:26.1.2
          args:
            - start-dev
            - --http-port=8080
          env:
            - name: KEYCLOAK_ADMIN
              valueFrom:
                secretKeyRef:
                  name: portal-secrets
                  key: KEYCLOAK_ADMIN_USERNAME
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: portal-secrets
                  key: KEYCLOAK_ADMIN_PASSWORD
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: portal
spec:
  selector:
    app: keycloak
  ports:
    - port: 8080
      targetPort: 8080
