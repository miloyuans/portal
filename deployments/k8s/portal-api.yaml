apiVersion: apps/v1
kind: Deployment
metadata:
  name: portal-api
  namespace: portal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portal-api
  template:
    metadata:
      labels:
        app: portal-api
    spec:
      containers:
        - name: portal-api
          image: portal-api:latest
          envFrom:
            - configMapRef:
                name: portal-config
            - secretRef:
                name: portal-secrets
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: portal-api
  namespace: portal
spec:
  selector:
    app: portal-api
  ports:
    - port: 8080
      targetPort: 8080
